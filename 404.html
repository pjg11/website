<html>
<title>404 Not Found</title>
<style>
body{font:1rem/1.15 system-ui,sans-serif;margin:auto;max-width:40rem;padding:3%}
p,li{line-height:1.33}
main{margin:1.5rem 0}
a{color:inherit;text-underline-offset:0.1rem;text-decoration-color:grey}
a:hover{text-decoration:none}
#notes a:visited{color:#777}
code,kbd{font-size:87.5%}
pre{overflow:auto;background:#eee;padding:0.6rem;line-height:1.15}
table{border-collapse:collapse;width:100%;text-align:left}

figure{margin:1rem 0}
figcaption{text-align:center}
img{height:auto;max-width:100%}
h1{margin:0;font-size:145%}
h2{font-size:120%;margin-top:1.3rem}
h3{font-size:100%}
sup{line-height:0;margin-left:0.1rem}
hr{border:1px solid #999;border-bottom:0}
#notes span{display:block}
iframe{width:100%;border:1px solid #999}
details>summary,span.b{font-weight:bold}
details[open]>summary{padding-bottom:0.5rem}
@media(prefers-color-scheme:dark){body{background:#000;color:#ccc}th,td,hr{border-color:#555}pre{background:#1a1a1a}#notes a:visited{color:#999}img.dim{filter:invert() contrast(0.85) hue-rotate(180deg)}}
</style>
<body>
    <h1>404 Not Found</h1>
    <hr>
    <p>Looks like this page doesn't exist. :/<br><a href="/">&larr; Home</a>.</p>

</html>
